<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Шпаргалка охотника</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
    background: #F2F2F7;
    min-height: 100vh;
    padding-bottom: 40px;
  }

  .status-bar { height: 48px; }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(242,242,247,0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 12px 16px 10px;
  }

  .header h1 {
    font-size: 13px;
    font-weight: 600;
    color: #8E8E93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-align: center;
    margin-bottom: 12px;
  }

  /* Product tabs */
  .tabs {
    display: flex;
    gap: 8px;
    background: #E5E5EA;
    border-radius: 12px;
    padding: 3px;
  }

  .tab {
    flex: 1;
    padding: 8px 4px;
    border: none;
    border-radius: 9px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    background: transparent;
    color: #8E8E93;
    transition: all 0.25s;
    line-height: 1.3;
    text-align: center;
  }

  .tab.active {
    background: #fff;
    color: #000;
    box-shadow: 0 2px 8px rgba(0,0,0,0.12);
  }

  .content { padding: 16px; }

  /* Dots */
  .dots {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }

  .dot {
    height: 5px;
    border-radius: 3px;
    transition: all 0.3s;
    cursor: pointer;
  }

  .dot.active { width: 22px; }
  .dot.inactive { width: 8px; background: #C7C7CC; }

  /* Opener card */
  .opener-card {
    border-radius: 18px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
    position: relative;
    overflow: hidden;
  }

  .opener-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    border-radius: 50%;
    background: rgba(255,255,255,0.1);
  }

  .opener-label {
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.7);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
  }

  .opener-text {
    font-size: 17px;
    font-weight: 600;
    color: #fff;
    line-height: 1.45;
  }

  /* Answer section */
  .answers-label {
    font-size: 12px;
    font-weight: 600;
    color: #8E8E93;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  .answers { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }

  .answer-block { border-radius: 14px; overflow: hidden; background: #fff; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .answer-btn {
    width: 100%;
    padding: 16px;
    background: #fff;
    border: none;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    text-align: left;
    gap: 12px;
  }

  .answer-btn span.label {
    font-size: 16px;
    font-weight: 600;
    color: #1C1C1E;
    flex: 1;
  }

  .answer-btn .chevron {
    font-size: 13px;
    color: #C7C7CC;
    transition: transform 0.25s;
    flex-shrink: 0;
  }

  .answer-btn.open .chevron { transform: rotate(180deg); }

  .answer-response {
    display: none;
    padding: 14px 16px 16px;
    font-size: 15px;
    line-height: 1.55;
    color: #3A3A3C;
    border-top: 1px solid #F2F2F7;
  }

  .answer-response.open { display: block; }

  .response-icon { font-size: 18px; margin-right: 6px; }

  /* Nav */
  .nav {
    display: flex;
    gap: 12px;
  }

  .nav-btn {
    flex: 1;
    padding: 14px;
    border-radius: 14px;
    border: none;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    color: #fff;
  }

  .nav-btn:active { transform: scale(0.97); }
  .nav-btn:disabled { background: #E5E5EA !important; color: #C7C7CC; cursor: default; }

  /* color accents per product */
  .c-docs { background: #6C3FE8; }
  .c-kiosk { background: #1A73E8; }
  .c-hr { background: #0F9D6E; }

  .opener-docs { background: linear-gradient(135deg, #6C3FE8, #9B6DFF); }
  .opener-kiosk { background: linear-gradient(135deg, #1A73E8, #4DA3FF); }
  .opener-hr { background: linear-gradient(135deg, #0F9D6E, #34C98A); }

  .dot-docs { background: #6C3FE8; }
  .dot-kiosk { background: #1A73E8; }
  .dot-hr { background: #0F9D6E; }

  .border-docs { border-top: 3px solid #6C3FE8 !important; }
  .border-kiosk { border-top: 3px solid #1A73E8 !important; }
  .border-hr { border-top: 3px solid #0F9D6E !important; }

  .tab-docs.active { color: #6C3FE8; }
  .tab-kiosk.active { color: #1A73E8; }
  .tab-hr.active { color: #0F9D6E; }
</style>
</head>
<body>

<div class="status-bar"></div>

<div class="header">
  <h1>🎯 Шпаргалка охотника</h1>
  <div class="tabs">
    <button class="tab tab-docs active" onclick="setProduct('docs')">📦 DocsInBox</button>
    <button class="tab tab-kiosk" onclick="setProduct('kiosk')">🖥️ Get Kiosk</button>
    <button class="tab tab-hr" onclick="setProduct('hr')">👥 Get HR</button>
  </div>
</div>

<div class="content">
  <div class="dots" id="dots"></div>
  <div class="opener-card" id="openerCard">
    <div class="opener-label" id="openerLabel"></div>
    <div class="opener-text" id="openerText"></div>
  </div>
  <div class="answers-label">Если клиент говорит →</div>
  <div class="answers" id="answers"></div>
  <div class="nav">
    <button class="nav-btn" id="btnPrev" onclick="prev()">← Назад</button>
    <button class="nav-btn" id="btnNext" onclick="next()">Вперёд →</button>
  </div>
</div>

<script>
const data = {
  docs: {
    color: 'docs',
    label: '📦 DocsInBox',
    cards: [
      {
        opener: 'Кто у вас гасит ВСД по Меркурию и ЕГАИС — вручную или уже автоматика стоит?',
        answers: [
          { q: 'Вручную', a: 'Значит каждый день теряете время и есть риск просрочки если бухгалтер заболел. Покажу как выглядит у нас — буквально 2 минуты.' },
          { q: 'Есть что-то', a: 'А автосписание пива через Честный знак настроено? Это наше последнее обновление — большинство пока не знают что так вообще можно.' },
          { q: 'Нет алкоголя', a: 'Тогда для вас актуальнее маркировка — с марта добавились безалкогольные напитки, скоро икра и бакалея. Уже готовитесь?' },
        ]
      },
      {
        opener: 'Были штрафы от госсистем или пока везёт?',
        answers: [
          { q: 'Были', a: 'Тогда знаете цену вопроса. Система предупреждает о рисках до проверки — прямо в Telegram руководителю. Покажу?' },
          { q: 'Везёт', a: 'Штрафы от Честного знака — до 1 млн ₽, от ЕГАИС — до 500 тыс. Стоит один раз выстроить защиту. Покажу как?' },
          { q: 'Не знаю', a: 'А кто у вас за это отвечает? Если никто не мониторит — риск есть. Можем прямо сейчас оценить.' },
        ]
      },
      {
        opener: 'Сколько точек в сети? У нас кейс — один бухгалтер ведёт 6 ресторанов вместо трёх.',
        answers: [
          { q: '1–2 точки', a: 'Главная ценность — не зависеть от одного человека. Бухгалтер заболел — ресторан работает без сбоев.' },
          { q: '3–5 точек', a: 'Это наша целевая история. Посчитаем сколько тратите на бухгалтеров и сколько можно сэкономить?' },
          { q: 'Больше 5', a: 'Сеть из 9 точек экономит ~4 млн в год только на контроле цен поставщиков. Давайте сядем и посчитаем под вас.' },
        ]
      },
    ]
  },
  kiosk: {
    color: 'kiosk',
    label: '🖥️ Get Kiosk',
    cards: [
      {
        opener: 'Есть очереди в часы пик? Киоск держит поток двух кассиров, а средний чек выше на 45%.',
        answers: [
          { q: 'Да, есть', a: 'Значит теряете гостей которые не хотят ждать. Покажу кейс — 11 месяцев работы, все цифры прозрачно.' },
          { q: 'Очередей нет', a: 'Тогда главное — средний чек. Киоск продаёт допы лучше любого кассира. +45% — реальная цифра наших клиентов.' },
          { q: 'Поток небольшой', a: 'При небольшом потоке киоск особенно выгоден. Сокращаете кассира, но каждый гость получает больше предложений. Окупается за 2 месяца.' },
        ]
      },
      {
        opener: 'Как с кассирами — текучка есть?',
        answers: [
          { q: 'Постоянная', a: 'Бесконечные деньги на найм и обучение. Киоск не увольняется и не болеет. Посчитаем сколько стоит один кассир в год?' },
          { q: 'Всё стабильно', a: 'Хорошо. Но киоск добавляет выручку сверху, не вместо людей. 45% к чеку — деньги которых сейчас просто нет в кассе.' },
          { q: 'Не думали', a: 'Лучшие результаты у тех кто внедрил превентивно — как инструмент роста выручки, а не замену персоналу.' },
        ]
      },
      {
        opener: 'Считали во сколько обходится один кассир в год?',
        answers: [
          { q: 'Примерно знаю', a: 'Добавьте больничные, замены, обучение, ошибки. Реальная цифра в 1,5 раза больше. 4 киоска — 55 тыс/мес vs 180 тыс зарплат.' },
          { q: 'Не считал', a: 'Давайте прямо сейчас — сколько кассиров, какая зарплата? Покажу расчёт окупаемости за 5 минут.' },
          { q: 'Не моё решение', a: 'Кто принимает такие решения? Подготовим готовый расчёт — вам останется только показать руководителю.' },
        ]
      },
    ]
  },
  hr: {
    color: 'hr',
    label: '👥 Get HR',
    cards: [
      {
        opener: 'Как фиксируете явки — по карточкам или на доверии?',
        answers: [
          { q: 'По карточкам', a: 'Карточку можно передать. Платите за человека который физически не пришёл. Биометрия исключает это полностью.' },
          { q: 'На доверии', a: 'Самый дорогой вариант — просто не видно сколько стоит. «Прикрытие» обходится в десятки тысяч в месяц.' },
          { q: 'Есть система', a: 'Что именно неудобно? Чаще всего — нет интеграции с iiko или нет контроля для руководителя. Мы закрываем и то и другое.' },
        ]
      },
      {
        opener: 'Сколько времени уходит на закрытие табеля?',
        answers: [
          { q: 'Несколько дней', a: 'У наших клиентов было так же. После внедрения — пару часов. Табель формируется автоматически из явок.' },
          { q: 'Справляемся', a: 'А зарплата автоматически из отработанных часов считается или всё равно руками? Мы закрываем и этот шаг — выгрузка прямо в iiko.' },
          { q: 'Головная боль', a: 'Система должна делать это сама. Покажу — табель, расчёт, выгрузка в iiko. Всё автоматически.' },
        ]
      },
      {
        opener: 'Бывало что узнавали об опоздании уже постфактум?',
        answers: [
          { q: 'Да, постоянно', a: 'Это управление вслепую. У нас руководитель получает уведомление в Telegram когда сотрудник не открыл смену вовремя.' },
          { q: 'Стараемся', a: 'А если несколько точек — физически можете уследить за всеми? Мы собираем все точки в один экран в реальном времени.' },
          { q: 'Дисциплина строгая', a: 'Get HR не добавит дисциплины — он подтвердит её цифрами. Рейтинг явок, план/факт, переработки — всё прозрачно.' },
        ]
      },
    ]
  }
};

let curProduct = 'docs';
let curCard = 0;
let expanded = null;

function setProduct(p) {
  curProduct = p;
  curCard = 0;
  expanded = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelector('.tab-' + p).classList.add('active');
  render();
}

function prev() {
  if (curCard > 0) { curCard--; expanded = null; render(); }
}

function next() {
  const cards = data[curProduct].cards;
  if (curCard < cards.length - 1) { curCard++; expanded = null; render(); }
}

function toggleAnswer(i) {
  expanded = expanded === i ? null : i;
  render();
}

function render() {
  const p = data[curProduct];
  const card = p.cards[curCard];
  const c = p.color;

  // opener
  document.getElementById('openerCard').className = `opener-card opener-${c}`;
  document.getElementById('openerLabel').textContent = `🎤 Открывашка ${curCard + 1} из ${p.cards.length}`;
  document.getElementById('openerText').textContent = `«${card.opener}»`;

  // dots
  const dotsEl = document.getElementById('dots');
  dotsEl.innerHTML = p.cards.map((_, i) =>
    `<div class="dot ${i === curCard ? `active dot-${c}` : 'inactive'}" onclick="curCard=${i};expanded=null;render()"></div>`
  ).join('');

  // answers
  const answersEl = document.getElementById('answers');
  answersEl.innerHTML = card.answers.map((a, i) => `
    <div class="answer-block">
      <button class="answer-btn ${expanded === i ? 'open' : ''}" onclick="toggleAnswer(${i})">
        <span class="label">«${a.q}»</span>
        <span class="chevron">▼</span>
      </button>
      <div class="answer-response ${expanded === i ? `open border-${c}` : ''}">
        <span class="response-icon">👉</span>${a.a}
      </div>
    </div>
  `).join('');

  // nav buttons
  const prev = document.getElementById('btnPrev');
  const next = document.getElementById('btnNext');
  prev.className = `nav-btn c-${c}`;
  next.className = `nav-btn c-${c}`;
  prev.disabled = curCard === 0;
  next.disabled = curCard === p.cards.length - 1;
}

render();
</script>
</body>
</html>
